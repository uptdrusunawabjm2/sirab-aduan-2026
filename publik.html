<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Aduan</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<script src="https://cdn.tailwindcss.com"></script>

<style>
.watermark{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; z-index:0;
}
.watermark span{
  font-size:8vw; font-weight:900;
  color:rgba(255,255,255,0.04);
  transform:rotate(-25deg);
  user-select:none; white-space:nowrap;
}

/* ===== MOBILE TABLE STABLE ===== */
@media (max-width:768px){

  #table{
    font-size:12px;
  }

  #table th{
    white-space:nowrap;
    font-size:11px;
  }

  #table td{
    white-space:normal;
    word-break:normal;
    overflow-wrap:break-word;
  }

}
</style>
</head>

<body class="bg-slate-950 text-white min-h-screen p-3 md:p-4 relative">
<div class="watermark"><span>DATA ADUAN</span></div>

<div class="max-w-7xl mx-auto space-y-4 relative z-10">

<div class="text-center space-y-1">
  <h1 class="text-xl md:text-3xl font-bold">Daftar Layanan Pengaduan</h1>
  <p class="text-slate-400 text-xs md:text-sm">monitoring pengaduan rusunawa</p>
  <p id="lastUpdate" class="text-[11px] text-slate-500"></p>
</div>

<!-- CARD STATS (ULTRA COMPACT MOBILE) -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-1 md:gap-3">

  <!-- TOTAL -->
  <div class="bg-slate-900 border border-slate-800
              rounded-md md:rounded-xl
              px-2 py-1.5 md:p-4">
    <div class="text-slate-400 text-[9px] md:text-sm leading-tight">Total Aduan</div>
    <div id="rTotal" class="text-sm md:text-2xl font-semibold leading-tight">0</div>
  </div>

  <!-- MENUNGGU -->
  <div class="bg-yellow-500/20 border border-yellow-500
              rounded-md md:rounded-xl
              px-2 py-1.5 md:p-4">
    <div class="text-yellow-300 text-[9px] md:text-sm leading-tight">Menunggu</div>
    <div id="rPending" class="text-sm md:text-2xl font-semibold text-yellow-400 leading-tight">0</div>
  </div>

  <!-- DIPERIKSA -->
  <div class="bg-blue-600/20 border border-blue-600
              rounded-md md:rounded-xl
              px-2 py-1.5 md:p-4">
    <div class="text-blue-300 text-[9px] md:text-sm leading-tight">Diperiksa</div>
    <div id="rPeriksa" class="text-sm md:text-2xl font-semibold text-blue-400 leading-tight">0</div>
  </div>

  <!-- SELESAI -->
  <div class="bg-green-600/20 border border-green-600
              rounded-md md:rounded-xl
              px-2 py-1.5 md:p-4">
    <div class="text-green-300 text-[9px] md:text-sm leading-tight">Selesai</div>
    <div id="rSelesai" class="text-sm md:text-2xl font-semibold text-green-400 leading-tight">0</div>
  </div>

</div>

<!-- FILTER BAR -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-1.5 md:gap-2">

  <!-- SEARCH -->
  <div class="col-span-2 md:col-span-1">
    <input id="search" oninput="applyFilter()" placeholder="🔍 Cari data..."
      class="w-full h-9 md:h-11 px-2.5 md:px-3
             rounded-lg md:rounded-xl
             bg-slate-800 border border-slate-700
             text-xs md:text-sm">
  </div>

  <!-- RUSUN -->
  <div>
    <select id="filterRusun" onchange="applyFilter()"
      class="w-full h-9 md:h-11 px-2.5 md:px-3
             rounded-lg md:rounded-xl
             bg-slate-800 border border-slate-700
             text-xs md:text-sm">
      <option value="">Semua Rusunawa</option>
    </select>
  </div>

  <!-- STATUS -->
  <div>
    <select id="filterStatus" onchange="applyFilter()"
      class="w-full h-9 md:h-11 px-2.5 md:px-3
             rounded-lg md:rounded-xl
             bg-slate-800 border border-slate-700
             text-xs md:text-sm">
      <option value="">Semua Status</option>
      <option value="PENDING">MENUNGGU</option>
      <option value="DIPERIKSA">DIPERIKSA</option>
      <option value="SELESAI">SELESAI</option>
    </select>
  </div>

  <!-- RESET -->
  <div class="col-span-2 md:col-span-1">
    <button onclick="resetFilter()"
      class="w-full h-9 md:h-11
             rounded-lg md:rounded-xl
             bg-red-600/20 border border-red-600
             text-red-400 hover:bg-red-600 hover:text-white
             transition text-xs md:text-sm">
      🔄 Reset Filter
    </button>
  </div>

</div>

<div class="bg-slate-900 border border-slate-800 rounded-xl overflow-x-auto max-h-[65vh]">
  <table class="w-full text-xs md:text-sm" id="table"></table>
</div>

<div class="flex flex-wrap items-center justify-center gap-2 text-xs md:text-sm">
  <button onclick="prevPage()" class="px-3 py-1.5 rounded bg-slate-800 border border-slate-700">⏮ Prev</button>
  <div id="pages" class="flex flex-wrap gap-1"></div>
  <button onclick="nextPage()" class="px-3 py-1.5 rounded bg-slate-800 border border-slate-700">Next ⏭</button>
</div>

</div>

<!-- ================= POPUP FOTO ================= -->
<div id="fotoModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
  <div class="relative max-w-3xl w-full">
    <button onclick="closeFoto()" class="absolute -top-3 -right-3 bg-red-600 text-white rounded-full w-8 h-8">✕</button>
    <img id="fotoView" src="" class="w-full max-h-[85vh] object-contain rounded-xl border border-slate-700 bg-black">
  </div>
</div>

<!-- ================= POPUP STATUS ================= -->
<div id="statusModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
  <div class="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-lg p-5 space-y-4 relative">

    <button onclick="closeStatus()" 
      class="absolute -top-3 -right-3 bg-red-600 text-white rounded-full w-8 h-8">✕</button>

    <h2 class="text-lg font-bold text-center">Detail Status Aduan</h2>

    <div>
      <div class="text-xs text-slate-400">HASIL PERIKSA</div>
      <div id="modalPeriksa" class="text-sm"></div>
    </div>

    <div>
      <div class="text-xs text-slate-400">HASIL PENANGANAN</div>
      <div id="modalPenanganan" class="text-sm"></div>
    </div>

    <div>
      <div class="text-xs text-slate-400">CATATAN</div>
      <div id="modalCatatan" class="text-sm"></div>
    </div>

  </div>
</div>
<script>
const API = "https://script.google.com/macros/s/AKfycbwyiBhW4WoSehZ86jYH8CqW_k-GgTvVJ0QOkc1UT_4kXfY5cJZ0xGsMujELidj76TIcUg/exec";
const PUBLIC_KEY = "rusun2026";
const PER_PAGE = 10;

const SHOW_COLS = [
 "Submission ID","Submission Date","RUSUNAWA","NAMA LENGKAP",
 "NOMOR HP/WA","NOMOR UNIT/SARUSUNAWA","ISI LAPORAN",
 "FOTO DOKUMENTASI","JANJI TEMU"
];

let HEAD=[], RAW=[], FILTERED=[];
let IDX_DATE=-1, IDX_RUSUN=-1, PAGE=1;

load(true);

/* ===== POPUP FOTO ===== */
function openFoto(url){
  fotoView.src = url;
  fotoModal.classList.remove("hidden");
  fotoModal.classList.add("flex");
}
function closeFoto(){
  fotoModal.classList.add("hidden");
  fotoModal.classList.remove("flex");
  fotoView.src="";
}
/* ====================== */

async function load(first){
 const r = await fetch(`${API}?action=all&key=${PUBLIC_KEY}`);
 const j = await r.json();
 HEAD=j.header; RAW=j.data;

 IDX_DATE = HEAD.indexOf("Submission Date");
 IDX_RUSUN = HEAD.indexOf("RUSUNAWA");

 RAW.sort((a,b)=> new Date(b[IDX_DATE]) - new Date(a[IDX_DATE]));
 if(first) buildRusun();
 applyFilter(false);

const now = new Date();

const tanggal = now.toLocaleDateString("id-ID", {
  timeZone: "Asia/Makassar",
  day: "2-digit",
  month: "2-digit",
  year: "numeric"
});

const jam = now.toLocaleTimeString("id-ID", {
  timeZone: "Asia/Makassar",
  hour: "2-digit",
  minute: "2-digit",
  hour12: false
});

lastUpdate.textContent = `Update: ${tanggal} Pukul ${jam} WITA`;
}

function buildRusun(){
 let s=new Set();
 RAW.forEach(r=>s.add(r[IDX_RUSUN]));
 [...s].filter(Boolean).forEach(v=>{
  filterRusun.innerHTML+=`<option value="${v}">${v}</option>`;
 });
}

function resetFilter(){
  search.value="";
  filterRusun.value="";
  filterStatus.value="";
  PAGE=1;
  applyFilter(false);
}

function applyFilter(resetPage=true){
 if(resetPage) PAGE=1;
 const q=search.value.toLowerCase();
 const rusun=filterRusun.value;
 const st=filterStatus.value;
 
 FILTERED = RAW.filter(r=>{
  if(q && !r.join(" ").toLowerCase().includes(q)) return false;
  if(rusun && r[IDX_RUSUN]!==rusun) return false;
  const status=getStatus(r);
  if(st && status!==st) return false;
   return true;
 });

 hitungRekapPublik(); renderTable(); renderPages();
}

function hitungRekapPublik(){
 let p=0,d=0,s=0;
 FILTERED.forEach(r=>{
  const st=getStatus(r);
  if(st==="PENDING")p++;
  else if(st==="DIPERIKSA")d++;
  else if(st==="SELESAI")s++;
 });
 rTotal.textContent=FILTERED.length;
 rPending.textContent=p; rPeriksa.textContent=d; rSelesai.textContent=s;
}

function renderTable(){
 const start=(PAGE-1)*PER_PAGE;
 const rows=FILTERED.slice(start,start+PER_PAGE);
 const cols=HEAD.map((h,i)=>({h,i})).filter(x=>SHOW_COLS.includes(x.h));

 let h="<tr class='bg-slate-800 sticky top-0'>";
 cols.forEach(c=>h+=`<th class="p-2 border border-slate-700">${c.h}</th>`);
 h+="<th class='p-2 border border-slate-700'>STATUS</th></tr>";

 rows.forEach(r=>{
  const st=getStatus(r);
  h+="<tr class='hover:bg-slate-800'>";
  cols.forEach(c=>{
   let val=r[c.i]||"";
   if(c.h==="Submission Date") val=fmt(val);
   if(c.h==="JANJI TEMU") val=fmtHariJamSheet(val);
   if(c.h==="NOMOR HP/WA") val=maskHP(val);
   if(c.h.toLowerCase().includes("foto")) val=foto(val);
   h+=`<td class="p-2 border border-slate-800 align-top">${val}</td>`;
  });
  h+=`<td class="p-2 border border-slate-800 text-center">
       <div onclick='openStatus(${JSON.stringify(r)})' class="cursor-pointer">
         ${badge(st)}
       </div>
     </td></tr>`;
 });
 table.innerHTML=h;
}

/* ===== FOTO CELL (DIPERBAIKI) ===== */
function foto(v){
 if(!v) return "";
 return String(v).split(/\n|,/)
  .map(x=>x.trim())
  .filter(Boolean)
  .map(x=>`<a href="${x}" target="_blank" rel="noopener" class="text-cyan-400 underline mr-2">lihat</a>`)
  .join("");
}
/* ================================= */

function getStatus(r){
 const m={}; HEAD.forEach((h,i)=>m[h]=r[i]);
 if(m["Teknisi"]&&m["Tanggal Penanganan"]&&m["Hasil Penanganan"]) return "SELESAI";
 if(m["Pemeriksa"]&&m["Tanggal Periksa"]&&m["Hasil Periksa"]) return "DIPERIKSA";
 return "PENDING";
}

function badge(st){
 if(st==="SELESAI") return `<span class="bg-green-600/20 text-green-400 px-2 py-1 rounded text-xs">SELESAI</span>`;
 if(st==="DIPERIKSA") return `<span class="bg-blue-600/20 text-blue-400 px-2 py-1 rounded text-xs">DIPERIKSA</span>`;
 return `<span class="bg-yellow-400/20 text-yellow-300 px-2 py-1 rounded text-xs">MENUNGGU</span>`;
}

function renderPages(){
 pages.innerHTML="";
 const total=Math.ceil(FILTERED.length/PER_PAGE)||1;
 for(let i=1;i<=total;i++){
  const b=document.createElement("button");
  b.textContent=i;
  b.className="px-2 py-1 rounded border "+(i===PAGE?"bg-blue-600 border-blue-500":"bg-slate-800 border-slate-700");
  b.onclick=()=>{PAGE=i;renderTable();renderPages();};
  pages.appendChild(b);
 }
}
function prevPage(){if(PAGE>1){PAGE--;renderTable();renderPages();}}
function nextPage(){const t=Math.ceil(FILTERED.length/PER_PAGE)||1;if(PAGE<t){PAGE++;renderTable();renderPages();}}

function fmt(v){
 const d=new Date(v);
 return isNaN(d)?v:d.toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"});
}

function fmtHariJamSheet(v){
 if(!v) return "";
 const raw = String(v).trim();
 const jamMatch = raw.match(/\d{1,2}:\d{2}\s*-\s*\d{1,2}:\d{2}|\d{1,2}:\d{2}/);
 const jam = jamMatch ? jamMatch[0] : "";
 const d = new Date(raw);
 if(isNaN(d)) return raw;
 const tanggal = d.toLocaleDateString("id-ID",{
   weekday:"long",
   day:"2-digit",
   month:"long",
   year:"numeric"
 });
 return jam ? tanggal+" "+jam : tanggal;
}

function maskHP(v){
 v=String(v||"").replace(/\D/g,"");
 return v.length<7?v:v.substring(0,4)+"****"+v.substring(v.length-4);
}

function openStatus(row){

  const map = {};
  HEAD.forEach((h,i)=>map[h]=row[i]);

  const hasilPeriksa    = map["Hasil Periksa"];
  const hasilPenanganan = map["Hasil Penanganan"];
  const catatan         = map["Catatan"];

  const status = getStatus(row);

  /* ===== STATUS MENUNGGU ===== */
  if(status === "PENDING"){
    modalPeriksa.textContent    = "Belum diperiksa";
    modalPenanganan.textContent = "-";
    modalCatatan.textContent    = catatan ? catatan : "-";
  }

  /* ===== STATUS DIPERIKSA ===== */
  else if(status === "DIPERIKSA"){
    modalPeriksa.textContent    = hasilPeriksa ? hasilPeriksa : "-";
    modalPenanganan.textContent = "-";
    modalCatatan.textContent    = catatan ? catatan : "-";
  }

  /* ===== STATUS SELESAI ===== */
  else if(status === "SELESAI"){
    modalPeriksa.textContent    = hasilPeriksa ? hasilPeriksa : "-";
    modalPenanganan.textContent = hasilPenanganan ? hasilPenanganan : "-";
    modalCatatan.textContent    = catatan ? catatan : "-";
  }

  statusModal.classList.remove("hidden");
  statusModal.classList.add("flex");
}

function closeStatus(){
  statusModal.classList.add("hidden");
  statusModal.classList.remove("flex");
}
</script>
</body>
</html>
